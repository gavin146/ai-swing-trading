name: Copilot Preview Validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - codex/copilot-stabilization

jobs:
  verify-copilot:
    name: Verify Copilot owner preview
    runs-on: ubuntu-latest
    env:
      BROKERAGE_CONNECTIONS_ENABLED: "false"
      COPILOT_AI_NARRATION_ENABLED: "false"
      COPILOT_ENABLED: "false"
      COPILOT_FIXTURE_MODE: "false"
      PAPER_TRADING_ENABLED: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run serial Copilot verification
        run: npm run verify:copilot
