name: Copilot Preview Validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - codex/copilot-stabilization
      - "codex/**"

permissions:
  contents: read

jobs:
  verify-copilot:
    name: Verify Copilot owner preview
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BROKERAGE_CONNECTIONS_ENABLED: "false"
      COPILOT_AI_NARRATION_ENABLED: "false"
      COPILOT_ENABLED: "false"
      COPILOT_FIXTURE_MODE: "false"
      PAPER_TRADING_ENABLED: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: |
          node --version
          npm --version
          npm ci --no-audit --no-fund

      - name: Run deploy-equivalent verification
        run: npm run verify:deploy
